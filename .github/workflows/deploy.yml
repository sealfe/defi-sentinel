name: Deploy DeFi Sentinel

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 12 * * 0'  # Weekly on Sunday at 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Fetch fresh data from CPW API (only on schedule/manual trigger)
      - name: Fetch security events
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/api-call.js
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        continue-on-error: true

      # Generate AI analysis (only on schedule/manual trigger)
      - name: Generate AI analysis
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/ai-analysis.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # Commit updated data files
      - name: Commit data updates
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          if ! git diff --staged --quiet; then
            if [ "${{ github.event_name }}" = "schedule" ]; then
              git commit -m "🛡️ Scheduled security update - $(date -u '+%Y-%m-%d %H:%M')"
            else
              git commit -m "🛡️ Manual security update - $(date -u '+%Y-%m-%d %H:%M')"
            fi
            git push
          fi

      # Deploy to GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
